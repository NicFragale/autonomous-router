# compose.yml — NetFoundry Autonomous Edge Router
#
# NFRAGALE/20260402 - Made by a human at NetFoundry.
#
# REQUIRED host-side prep (Ubuntu 22.04 / 24.04):
#   sudo mkdir -p /etc/systemd/resolved.conf.d
#   sudo chmod 755 /etc/systemd/resolved.conf.d
#
# Build Local:
#   docker build -t netfoundry/autonomous-router:local .

services:
  autonomous-er:
    container_name: netfoundry-er
    # Pull published image instead with:
    # image: netfoundry/autonomous-router:latest
    # build: .
    image: ghcr.io/nicfragale/autonomous-router:latest
    pull_policy: always
    restart: unless-stopped
    # Grace period for shutdown: entrypoint must kill Ziti, remove the
    # resolved drop-in, and restart systemd-resolved before Docker sends SIGKILL.
    # Default Docker timeout is 10s — too short when the supervisor loop
    # sleep can take up to 60s to notice SIGTERM (fixed in entrypoint via
    # "sleep 60 & wait $!" but the grace period is a safety net).
    stop_grace_period: 30s

    # Host networking is required: the ER's DNS server must be reachable on the
    # host's loopback/LAN interface, and NET_ADMIN is needed for tun/iptables.
    network_mode: host
    # Share the host PID namespace so systemctl sees the host's
    # systemd as PID 1 and can restart systemd-resolved directly.
    pid: host
    cap_add:
      - NET_ADMIN

    environment:
      ## REGISTRATION ##
      # Provide on first run; ignored once certs/cert.pem exists.
      #- REG_KEY=[YOURKEY]
      - REG_KEY=${REG_KEY}

      ## TUNNEL MODE ##
      # "auto" for ziti chooses tunnel mode automatically.
      #   (unset) for host mode (default)
      - TUNNEL_MODE=${TUNNEL_MODE:-auto}

      ## VERBOSITY ##
      # Uncomment to pass -v to ziti router run
      #- VERBOSE=1

      ## PROXY ENABLEMENT ##
      #- HTTPS_PROXY=http://proxy.corp.example.com:3128

      # CHANGE ADVERTISED ADDRESS ##
      # Required when the host's public IP differs from its LAN IP.
      #- ADVERTISE_ADDRESS=203.0.113.10:443

      # AUTO UPDATE CONTROL ##
      # Default (unset): entrypoint polls controller every 60s and upgrades
      #   the ziti binary + restarts the process when versions diverge.
      # Please be aware, this allows an active container to update itself.
      #
      # Set to "true" to disable the loop entirely.  Ziti starts once and runs
      #   until the container stops — no mid-run restarts if the controller
      #   pushes an update.  Useful in controlled / pinned-version environments.
      - DISABLE_AUTO_UPDATE=${DISABLE_AUTO_UPDATE:-true}

      ## VERSION PIN ##
      # Force a specific ziti binary version regardless of what the controller
      #   reports.  Bypasses all version-match checks and suppresses auto-upgrade
      #   in the watch loop.  The crash-restart supervisor still runs and ziti will
      #   be restarted on the pinned version if it dies.
      #
      # To go fully static (no loop at all): set BOTH this AND DISABLE_AUTO_UPDATE=true.
      #
      # Format: vMAJOR.MINOR.PATCH  (must match the NetFoundry release tag)
      #- ZITI_VERSION_OVERRIDE=v1.7.2
      - ZITI_VERSION_OVERRIDE=${ZITI_VERSION_OVERRIDE}

      ## ZITI DNS CONFIG ##
      # When ZITI_DNS_CONFIGURE=true the entrypoint will write (or update)
      #   config.yml if ZITI_DNS_RANGE / ZITI_DNS_UPSTREAM are set.  It will
      #   also write a systemd-resolved drop-in conf and reload it if
      #   ZITI_DNS_MODE is also set.
      # Requires the two extra volume mounts below (systemd + dbus).
      - ZITI_DNS_CONFIGURE=true

      # Route ALL DNS through the Ziti DNS server:
      - ZITI_DNS_MODE=all

      # [OR] route only specific search domains:
      #- ZITI_DNS_MODE=domains
      #- ZITI_DNS_DOMAINS=lan ziti corp internal

      # Ziti DNS server IP.  Auto-detected from the host's default LAN route
      #   when left unset (usually correct, but set explicitly if needed).
      #- ZITI_DNS_IP=10.20.30.84

      # Fallback resolver when Ziti can't answer a query.
      #   Auto-detected from the host's current resolver when left unset.
      #- ZITI_DNS_FALLBACK=1.1.1.1
      - ZITI_DNS_FALLBACK=${ZITI_DNS_FALLBACK:-1.1.1.1}

      ## mDNS OVERRIDE ##
      # Uncomment if your DNS server serves .local records and you're getting
      #   SERVFAIL for them.  systemd-resolved intercepts .local queries on the
      #   mDNS stack before DNS routing applies; even with Domains=~.
      #   This adds MulticastDNS=no to the resolved drop-in, disabling that
      #   interception and letting .local flow through to the Ziti DNS server.
      - ZITI_DNS_DISABLE_MDNS=true

      # Patch config.yml tunnel listener options (written before ziti starts).
      #   ZITI_DNS_CONFIGURE=true is NOT required for these two as they work
      #   independently and only need yq (included in the image).
      - ZITI_DNS_RANGE=${ZITI_DNS_RANGE:-100.65.0.0/24}
      - ZITI_DNS_UPSTREAM=${ZITI_DNS_UPSTREAM:-udp://1.1.1.1:53}

      ## STATIC /etc/hosts INJECTION ##
      # Inject records into /etc/hosts before ziti starts.  Resolved locally by
      #   the OS so they are never forwarded to the Ziti overlay.  Separate
      #   records with semicolons or newlines.  Block is cleaned up on shutdown.
      #   To modify the HOST's /etc/hosts (not just the container's), add the
      #   volume mount below:  - /etc/hosts:/etc/hosts
      #
      # Supported entry formats (mixing is allowed):
      #
      #   "192.168.1.10 db.internal alias"  — written exactly as-is
      #
      #   "hostname.corp"                   — forward DNS lookup before Ziti
      #                                       starts; resolved IP is written
      #
      #   "10.20.30.84"                     — IP only; reverse DNS lookup
      #                                       writes all PTR records as aliases:
      #                                       10.20.30.84 fragale.lan test.fragale.lan
      #
      #   "INTERFACE_ASSIGNED"              — detects the host's primary LAN IP
      #                                       at runtime, then reverse-lookups it;
      #                                       useful when the host IP is dynamic
      - HOSTS_ENTRIES=${HOSTS_ENTRIES:-INTERFACE_ASSIGNED}

    volumes:
      # Router identity, certs, and config.yml are persisted on the host.
      - ./ziti_router:/etc/netfoundry

      ## REQUIRED SETTINGS IF ZITI_DNS_CONFIGURE=true ##
      # /etc/systemd      write the resolved drop-in conf to the host FS
      # /run/systemd      gives systemctl access to the host systemd's private
      #                     varlink socket (/run/systemd/private/io.systemd.Manager)
      #                     Used by: systemctl restart systemd-resolved
      - /etc/systemd:/etc/systemd
      - /run/systemd:/run/systemd

      ## REQUIRED SETTING IF MODIFYING HOSTS via HOSTS_ENTRIES ##
      - /etc/hosts:/etc/hosts

