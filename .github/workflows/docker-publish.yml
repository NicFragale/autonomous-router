# .github/workflows/docker-publish.yml
#
# Builds and pushes the autonomous-router image to:
#   - Docker Hub:  netfoundry/autonomous-router
#   - GHCR:        ghcr.io/YOUR_GITHUB_USERNAME/autonomous-router
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   — your Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token (not your password)
#                          Create at: https://hub.docker.com/settings/security
#
# GHCR auth uses the automatic GITHUB_TOKEN — no secret needed.

name: Build & Publish Docker Image

on:
  push:
    branches:
      - main          # publish latest on every push to main
    tags:
      - 'v*.*.*'      # publish versioned tag on  git tag v1.2.3  +  git push --tags
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

env:
  DOCKERHUB_IMAGE: netfoundry/autonomous-router
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/autonomous-router

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required for ghcr.io push

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── QEMU + Buildx (multi-arch support) ──────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login — Docker Hub ───────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Login — GitHub Container Registry ───────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive tags & labels ─────────────────────────────────────────────────
      # On push to main:         :latest
      # On git tag v1.2.3:       :v1.2.3  +  :1.2.3  +  :1.2  +  :latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      # ── Build & Push ─────────────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Remove or adjust platforms if you only target amd64
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Print published tags
        run: |
          echo "### 🐳 Published Image Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
